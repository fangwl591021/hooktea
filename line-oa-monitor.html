<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HookTea LINE 聊天室監控</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 9px; height: 9px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 999px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-slate-100 text-slate-950">
  <div class="h-screen overflow-hidden flex">
    <aside class="w-[360px] shrink-0 bg-white border-r border-slate-200 flex flex-col">
      <div class="p-4 border-b border-slate-100">
        <div class="flex items-start justify-between gap-4">
          <div>
            <h1 class="text-2xl font-black tracking-normal">LINE 聊天室監控</h1>
            <p class="mt-1 text-sm text-slate-500">只監看、標記與分析，不自動代回覆。</p>
          </div>
          <a href="/admin.html" class="rounded-xl bg-slate-950 px-4 py-2 text-sm font-black text-white">後台</a>
        </div>

        <div class="grid grid-cols-2 gap-2 mt-5">
          <a class="feature bg-slate-950 text-white" href="/admin.html">後台首頁</a>
          <a class="feature bg-emerald-500 text-white" href="/admin.html">學員 CRM</a>
          <button id="analyze-top" class="feature bg-sky-600 text-white">AI 分析</button>
          <a class="feature bg-violet-600 text-white" href="/admin.html">點數總表</a>
          <a class="feature bg-amber-500 text-white" href="/admin.html">付費推播</a>
          <a class="feature bg-blue-600 text-white" href="/admin.html">圖文選單</a>
        </div>

        <button id="import-members" class="mt-5 w-full rounded-xl bg-sky-600 px-4 py-3 text-base font-black text-white">
          匯入母站會員名單
        </button>

        <div class="flex gap-2 mt-3">
          <input id="search" class="min-w-0 flex-1 rounded-xl border border-slate-200 px-4 py-3 text-base outline-none focus:border-emerald-500" placeholder="搜尋姓名、ID、訊息或標籤">
          <button id="refresh" class="rounded-xl bg-emerald-500 px-4 py-3 text-base font-black text-white">同步</button>
        </div>

        <div class="flex flex-wrap gap-2 mt-3">
          <button class="filter active" data-filter="all">全部</button>
          <button class="filter" data-filter="open">待回覆</button>
          <button class="filter" data-filter="high">高風險</button>
        </div>
      </div>

      <div id="thread-list" class="flex-1 overflow-y-auto scrollbar-thin p-3 space-y-2"></div>
    </aside>

    <main class="flex-1 min-w-0 flex flex-col bg-white">
      <header class="h-[116px] shrink-0 border-b border-slate-200 px-6 py-4 flex items-center justify-between gap-4">
        <div id="active-header" class="min-w-0 flex items-center gap-4">
          <div class="h-12 w-12 rounded-full bg-slate-100 grid place-items-center text-xl font-black text-slate-400">?</div>
          <div class="min-w-0">
            <h2 class="text-2xl font-black">請選擇會員</h2>
            <p class="mt-1 text-sm text-slate-500">左側名單會依風險與最近訊息排序。</p>
          </div>
        </div>
        <div class="flex shrink-0 gap-3">
          <button class="status-btn" data-status="open">待回覆</button>
          <button class="status-btn" data-status="pending">處理中</button>
          <button class="status-btn" data-status="closed">完成</button>
        </div>
      </header>

      <div class="bg-slate-700 px-6 py-3 text-base font-black text-white">
        此頁只提供管理員監看與草稿，不消耗 LINE reply token。
      </div>

      <section class="flex-1 min-h-0 grid grid-cols-[1fr_360px]">
        <div class="min-w-0 flex flex-col">
          <div id="messages" class="flex-1 overflow-y-auto scrollbar-thin bg-slate-100 p-5 space-y-4"></div>

          <div class="shrink-0 border-t border-slate-200 bg-white p-4">
            <div class="flex flex-wrap items-center gap-2 mb-3">
              <span class="rounded-full bg-emerald-50 px-3 py-1.5 text-sm font-black text-emerald-700">帶入建議</span>
              <div id="active-tags" class="flex flex-wrap gap-2"></div>
            </div>
            <textarea id="note" rows="3" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-base outline-none focus:border-emerald-500" placeholder="內部備註"></textarea>
            <div class="mt-3 flex gap-2">
              <input id="new-tag" class="min-w-0 flex-1 rounded-xl border border-slate-200 px-4 py-3 text-base outline-none focus:border-emerald-500" placeholder="新增標籤">
              <button id="add-tag" class="rounded-xl bg-emerald-500 px-5 py-3 text-base font-black text-white">新增</button>
              <button id="save-thread" class="rounded-xl bg-slate-950 px-5 py-3 text-base font-black text-white">儲存</button>
            </div>
          </div>
        </div>

        <aside class="border-l border-slate-200 bg-white overflow-y-auto scrollbar-thin p-4">
          <section class="rounded-2xl border border-slate-200 p-4">
            <div class="flex items-center justify-between gap-3">
              <h3 class="text-xl font-black">受眾分析</h3>
              <span id="generated-at" class="text-sm text-slate-400">-</span>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-4">
              <div class="metric bg-slate-50"><span>30 天活躍</span><strong id="m-active30">0</strong></div>
              <div class="metric bg-rose-50"><span>高風險</span><strong id="m-high">0</strong></div>
              <div class="metric bg-sky-50"><span>7 天訊息</span><strong id="m-msg7">0</strong></div>
              <div class="metric bg-emerald-50"><span>未讀</span><strong id="m-unread">0</strong></div>
            </div>

            <h4 class="mt-5 text-sm font-black text-slate-500">需求熱度</h4>
            <div id="interest-bars" class="mt-3 space-y-2"></div>

            <h4 class="mt-5 text-sm font-black text-slate-500">常見標籤</h4>
            <div id="tag-stats" class="mt-3 flex flex-wrap gap-2"></div>

            <div class="mt-5 flex items-center justify-between">
              <h4 class="text-sm font-black text-slate-500">風險名單</h4>
              <button id="show-risk" class="rounded-full bg-rose-50 px-4 py-2 text-sm font-black text-rose-600">看全部</button>
            </div>
            <div id="risk-list" class="mt-3 space-y-3"></div>
          </section>

          <section class="mt-4 rounded-2xl border border-slate-200 p-4">
            <h3 class="text-xl font-black">推播草稿</h3>
            <input id="broadcast-title" class="mt-3 w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:border-emerald-500" placeholder="草稿標題">
            <textarea id="broadcast-text" rows="3" class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-2.5 outline-none focus:border-emerald-500" placeholder="推播內容"></textarea>
            <div class="mt-2 grid grid-cols-2 gap-2">
              <select id="broadcast-mode" class="rounded-xl border border-slate-200 px-3 py-2.5 font-bold outline-none focus:border-emerald-500">
                <option value="all">全部會員</option>
                <option value="high">高風險</option>
                <option value="tag">指定標籤</option>
              </select>
              <input id="broadcast-tag" class="rounded-xl border border-slate-200 px-3 py-2.5 outline-none focus:border-emerald-500" placeholder="標籤">
            </div>
            <div class="mt-2 grid grid-cols-2 gap-2">
              <button id="preview-broadcast" class="rounded-xl border border-slate-200 px-4 py-2.5 font-black">預估人數</button>
              <button id="create-broadcast" class="rounded-xl bg-emerald-500 px-4 py-2.5 font-black text-white">建立草稿</button>
            </div>
            <p id="broadcast-result" class="mt-3 text-sm font-bold text-slate-500">尚未建立草稿</p>
          </section>

          <section class="mt-4 rounded-2xl border border-slate-200 p-4">
            <h3 class="text-xl font-black">AI 訊號</h3>
            <div id="signals" class="mt-3 space-y-2"></div>
          </section>
        </aside>
      </section>
    </main>
  </div>

  <script>
    const WORKER_URL = location.protocol === "file:" ? "https://hooktea.fangwl591021.workers.dev" : location.origin;
    const params = new URLSearchParams(location.search);
    const urlPassword = params.get("adminPassword") || "";
    if (urlPassword) sessionStorage.setItem("act_admin_pwd", urlPassword);

    const state = {
      password: urlPassword || sessionStorage.getItem("act_admin_pwd") || "",
      threads: [],
      audience: null,
      active: null,
      filter: "all",
      riskExpanded: false,
    };

    const $ = id => document.getElementById(id);
    const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
    }[ch]));
    const dateText = value => value ? new Date(value).toLocaleString("zh-TW", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }) : "-";
    const riskLabel = value => ({ high: "高", medium: "中", low: "低" }[String(value || "low").toLowerCase()] || "低");
    const riskClass = value => ({
      high: "bg-rose-100 text-rose-700",
      medium: "bg-amber-100 text-amber-700",
      low: "bg-slate-100 text-slate-600",
    }[String(value || "low").toLowerCase()] || "bg-slate-100 text-slate-600");
    const statusLabel = value => ({ open: "待回覆", pending: "處理中", closed: "完成" }[value] || "待回覆");
    const statusClass = value => ({
      open: "bg-slate-950 text-white",
      pending: "bg-sky-50 text-sky-700",
      closed: "bg-emerald-50 text-emerald-700",
    }[value] || "bg-slate-950 text-white");

    async function fetchJson(url, options = {}, retry = true) {
      if (!state.password) promptPassword();
      const headers = { ...(options.headers || {}), "x-hooktea-admin-password": state.password };
      if (options.body && !headers["Content-Type"]) headers["Content-Type"] = "application/json";
      const res = await fetch(url, { ...options, headers });
      const data = await res.json().catch(() => null);
      if (!res.ok || data?.success === false) {
        if ((res.status === 401 || res.status === 403) && retry) {
          sessionStorage.removeItem("act_admin_pwd");
          state.password = "";
          promptPassword();
          if (state.password) return fetchJson(url, options, false);
        }
        throw new Error(data?.error || data?.message || `HTTP ${res.status}`);
      }
      return data;
    }

    function promptPassword() {
      const password = prompt("HookTea 後台密碼") || "";
      if (password) sessionStorage.setItem("act_admin_pwd", password);
      state.password = password;
      return password;
    }

    function normalizeThread(row) {
      const tags = Array.isArray(row.tags) ? row.tags : String(row.tags || "").split(",").map(x => x.trim()).filter(Boolean);
      return {
        ...row,
        id: String(row.id || row.userId || ""),
        userId: String(row.userId || row.id || ""),
        name: row.name || row.displayName || row.lineName || row.id || "未命名會員",
        pictureUrl: row.pictureUrl || row.avatar || "",
        status: row.status || "open",
        risk: row.risk || row.riskLevel || "low",
        riskLevel: row.riskLevel || row.risk || "low",
        unread: Number(row.unread || row.unreadCount || 0),
        tags,
      };
    }

    function normalizeAudience(data) {
      const payload = data?.data || {};
      const overview = payload.overview || {};
      const tags = (payload.tags || []).map(item => typeof item === "string" ? { label: item, count: 1 } : item);
      const interests = (payload.interests || tags).map(item => typeof item === "string" ? { label: item, count: 1 } : item);
      const riskThreads = (payload.riskThreads || []).map(normalizeThread);
      return { ...payload, overview, tags, interests, riskThreads };
    }

    function currentRows() {
      const q = $("search").value.trim().toLowerCase();
      return state.threads.filter(thread => {
        if (state.filter === "open" && thread.status === "closed") return false;
        if (state.filter === "high" && thread.riskLevel !== "high") return false;
        const haystack = [thread.name, thread.id, thread.summary, thread.lastMessageText, thread.tags.join(",")].join(" ").toLowerCase();
        return !q || haystack.includes(q);
      });
    }

    function renderThreads() {
      const rows = currentRows();
      $("thread-list").innerHTML = rows.map(thread => `
        <button data-id="${esc(thread.id)}" class="thread-card w-full rounded-2xl border p-4 text-left transition ${state.active?.id === thread.id ? "border-emerald-400 bg-emerald-50" : "border-slate-200 bg-white hover:border-emerald-300"}">
          <div class="flex gap-3">
            <img src="${esc(thread.pictureUrl || avatarUrl(thread.name))}" class="h-11 w-11 shrink-0 rounded-full object-cover bg-slate-100" alt="">
            <div class="min-w-0 flex-1">
              <div class="flex items-start justify-between gap-2">
                <h3 class="truncate text-lg font-black">${esc(thread.name)}</h3>
                <span class="text-xs text-slate-400">${esc(dateText(thread.lastMessageAt))}</span>
              </div>
              <p class="mt-1 truncate text-sm text-slate-400">${esc(thread.id)}</p>
              <p class="mt-1.5 line-clamp-2 text-sm text-slate-700">${esc(thread.summary || thread.lastMessageText || "尚無明顯互動紀錄")}</p>
              <div class="mt-2 flex flex-wrap gap-1.5">
                <span class="rounded-full px-2.5 py-1 text-xs font-black ${statusClass(thread.status)}">${esc(statusLabel(thread.status))}</span>
                <span class="rounded-full px-2.5 py-1 text-xs font-black ${riskClass(thread.riskLevel)}">${esc(riskLabel(thread.riskLevel))}風險</span>
                ${thread.tags.slice(0, 3).map(tag => `<span class="rounded-full bg-sky-50 px-2.5 py-1 text-xs font-black text-sky-700">${esc(tag)}</span>`).join("")}
                ${thread.unread ? `<span class="rounded-full bg-slate-950 px-2.5 py-1 text-xs font-black text-white">${thread.unread} 則</span>` : ""}
              </div>
            </div>
          </div>
        </button>
      `).join("") || `<div class="rounded-3xl border border-dashed border-slate-200 p-8 text-center font-bold text-slate-400">沒有符合條件的聊天室</div>`;
      document.querySelectorAll(".thread-card").forEach(btn => btn.addEventListener("click", () => loadThread(btn.dataset.id)));
    }

    function renderAudience() {
      const data = state.audience || { overview: {}, tags: [], interests: [], riskThreads: [] };
      const overview = data.overview || {};
      $("generated-at").textContent = dateText(data.generatedAt);
      $("m-active30").textContent = overview.activeThreads30d || overview.totalThreads || 0;
      $("m-high").textContent = overview.highRiskThreads || 0;
      $("m-msg7").textContent = overview.messages7d || 0;
      $("m-unread").textContent = overview.unreadMessages || 0;

      const maxInterest = Math.max(1, ...data.interests.map(item => Number(item.count || 0)));
      $("interest-bars").innerHTML = data.interests.slice(0, 5).map(item => `
        <div>
          <div class="mb-1 flex justify-between text-sm font-black">
            <span>${esc(item.label)}</span><span>${Number(item.count || 0)}</span>
          </div>
          <div class="h-3 rounded-full bg-slate-100 overflow-hidden">
            <div class="h-full rounded-full bg-emerald-500" style="width:${Math.max(6, Number(item.count || 0) / maxInterest * 100)}%"></div>
          </div>
        </div>
      `).join("") || `<p class="text-sm font-bold text-slate-400">尚無標籤統計</p>`;

      $("tag-stats").innerHTML = data.tags.slice(0, 14).map(item => `
        <button class="tag-stat rounded-full bg-slate-100 px-4 py-2 text-sm font-black" data-tag="${esc(item.label)}">${esc(item.label)} ${Number(item.count || 0)}</button>
      `).join("") || `<p class="text-sm font-bold text-slate-400">尚無標籤</p>`;
      document.querySelectorAll(".tag-stat").forEach(btn => btn.addEventListener("click", () => {
        $("search").value = btn.dataset.tag || "";
        renderThreads();
      }));

      const riskRows = state.riskExpanded ? data.riskThreads : data.riskThreads.slice(0, 3);
      $("risk-list").innerHTML = riskRows.map(thread => `
        <button data-id="${esc(thread.id)}" class="risk-card w-full rounded-xl border border-rose-100 bg-rose-50 p-3 text-left">
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0">
              <h5 class="truncate text-base font-black">${esc(thread.name)}</h5>
              <p class="mt-1 truncate text-xs text-slate-500">${esc(thread.id)}</p>
            </div>
            <span class="rounded-full bg-white px-2.5 py-1 text-xs font-black text-rose-600">${esc(riskLabel(thread.riskLevel))}</span>
          </div>
          <p class="mt-2 line-clamp-2 text-sm text-slate-700">${esc(thread.summary || "-")}</p>
          <div class="mt-2 flex justify-between text-xs text-slate-400"><span>${esc(dateText(thread.lastMessageAt))}</span><span>${thread.unread || 0} 未讀</span></div>
        </button>
      `).join("") || `<p class="text-sm font-bold text-slate-400">目前沒有高風險名單</p>`;
      document.querySelectorAll(".risk-card").forEach(btn => btn.addEventListener("click", () => loadThread(btn.dataset.id)));
    }

    function renderActive() {
      const thread = state.active;
      if (!thread) {
        $("messages").innerHTML = `<div class="grid h-full place-items-center text-lg font-bold text-slate-400">請先從左側選擇會員</div>`;
        $("signals").innerHTML = `<p class="font-bold text-slate-400">尚未選擇會員</p>`;
        return;
      }

      $("active-header").innerHTML = `
        <img src="${esc(thread.pictureUrl || avatarUrl(thread.name))}" class="h-14 w-14 rounded-full object-cover bg-slate-100" alt="">
        <div class="min-w-0">
          <h2 class="truncate text-3xl font-black">${esc(thread.name)}</h2>
          <p class="mt-1 text-base text-slate-500">${esc(thread.unread || 0)} 則訊息 · ${esc(thread.id)}</p>
          <div class="mt-2 flex flex-wrap gap-2">
            ${thread.tags.slice(0, 5).map(tag => `<span class="rounded-full bg-sky-50 px-3 py-1.5 text-sm font-black text-sky-700">${esc(tag)}</span>`).join("")}
            <span class="rounded-full px-3 py-1.5 text-sm font-black ${riskClass(thread.riskLevel)}">${esc(riskLabel(thread.riskLevel))}風險</span>
          </div>
        </div>
      `;

      document.querySelectorAll(".status-btn").forEach(btn => {
        const active = btn.dataset.status === thread.status;
        btn.classList.toggle("bg-slate-950", active);
        btn.classList.toggle("text-white", active);
      });

      $("note").value = thread.note || "";
      $("active-tags").innerHTML = (thread.tags || []).map(tag => `
        <button class="active-tag rounded-full bg-slate-100 px-3 py-1.5 text-sm font-black text-slate-700" data-tag="${esc(tag)}">${esc(tag)} ×</button>
      `).join("");
      document.querySelectorAll(".active-tag").forEach(btn => btn.addEventListener("click", () => {
        state.active.tags = state.active.tags.filter(tag => tag !== btn.dataset.tag);
        renderActive();
      }));

      $("signals").innerHTML = Object.entries(thread.signals || {}).map(([label, value]) => `
        <div class="rounded-2xl bg-slate-50 p-4">
          <div class="text-sm font-bold text-slate-400">${esc(label)}</div>
          <div class="mt-1 whitespace-pre-wrap text-lg font-black">${esc(value || "-")}</div>
        </div>
      `).join("") || `<p class="font-bold text-slate-400">尚無 AI 訊號</p>`;

      const messages = Array.isArray(thread.messages) ? thread.messages : [];
      $("messages").innerHTML = messages.map(message => {
        const isStaff = message.senderRole === "staff" || message.type === "admin";
        return `
          <div class="flex ${isStaff ? "justify-end" : "justify-start"}">
            <div class="max-w-[70%] rounded-2xl border p-4 shadow-sm ${isStaff ? "bg-slate-950 text-white border-slate-950" : "bg-white border-slate-200"}">
              <div class="mb-2 flex items-center justify-between gap-4">
                <span class="font-black ${isStaff ? "text-white" : "text-slate-500"}">${esc(message.senderName || message.title || "LINE 訊息")}</span>
                <span class="shrink-0 text-sm ${isStaff ? "text-slate-300" : "text-slate-400"}">${esc(dateText(message.createdAt))}</span>
              </div>
              <div class="whitespace-pre-wrap text-base leading-relaxed">${esc(message.text || "")}</div>
            </div>
          </div>
        `;
      }).join("") || `<div class="rounded-2xl border border-dashed border-slate-200 bg-white p-6 text-center font-bold text-slate-400">尚無聊天室訊息，請先在 LINE OA 測試留言後按同步。</div>`;
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function avatarUrl(name) {
      return `https://ui-avatars.com/api/?background=e0f2fe&color=0f172a&bold=true&name=${encodeURIComponent(name || "HT")}`;
    }

    async function loadAll(keepActive = true) {
      const [audienceRes, threadsRes] = await Promise.all([
        fetchJson(`${WORKER_URL}/api/line-oa/audience`),
        fetchJson(`${WORKER_URL}/api/line-oa/threads`),
      ]);
      state.audience = normalizeAudience(audienceRes);
      state.threads = (threadsRes.data || []).map(normalizeThread);
      renderAudience();
      renderThreads();
      if (keepActive && state.active) {
        const exists = state.threads.find(item => item.id === state.active.id);
        if (exists) await loadThread(state.active.id, false);
      } else if (state.threads.length) {
        await loadThread(state.threads[0].id, false);
      } else {
        renderActive();
      }
    }

    async function loadThread(id, rerenderList = true) {
      const res = await fetchJson(`${WORKER_URL}/api/line-oa/thread?id=${encodeURIComponent(id)}`);
      state.active = normalizeThread(res.data || {});
      state.active.messages = res.data?.messages || [];
      state.active.signals = res.data?.signals || {};
      state.active.note = res.data?.note || "";
      renderActive();
      if (rerenderList) renderThreads();
    }

    async function saveThread(status = null) {
      if (!state.active) return;
      const nextStatus = status || state.active.status || "open";
      const res = await fetchJson(`${WORKER_URL}/api/line-oa/thread`, {
        method: "POST",
        body: JSON.stringify({
          id: state.active.id,
          note: $("note").value,
          tags: state.active.tags || [],
          status: nextStatus,
        }),
      });
      state.active = normalizeThread(res.data || state.active);
      state.active.messages = res.data?.messages || [];
      state.active.signals = res.data?.signals || {};
      await loadAll(true);
    }

    async function backfillSignals() {
      $("analyze-top").disabled = true;
      try {
        await fetchJson(`${WORKER_URL}/api/line-oa/backfill-signals`, { method: "POST", body: JSON.stringify({ limit: 10 }) });
        await loadAll(true);
      } finally {
        $("analyze-top").disabled = false;
      }
    }

    async function previewBroadcast() {
      const res = await fetchJson(`${WORKER_URL}/api/broadcast/preview`, {
        method: "POST",
        body: JSON.stringify({ filters: { mode: $("broadcast-mode").value, tag: $("broadcast-tag").value.trim() } }),
      });
      $("broadcast-result").textContent = `預估可推播 ${res.data?.count || 0} 人`;
    }

    async function createBroadcast() {
      const res = await fetchJson(`${WORKER_URL}/api/broadcast/jobs`, {
        method: "POST",
        body: JSON.stringify({
          title: $("broadcast-title").value.trim() || "未命名推播草稿",
          text: $("broadcast-text").value.trim(),
          filters: { mode: $("broadcast-mode").value, tag: $("broadcast-tag").value.trim() },
        }),
      });
      $("broadcast-result").textContent = `已建立草稿 ${res.data?.id || ""}，對象 ${res.data?.recipientCount || 0} 人`;
    }

    document.querySelectorAll(".filter").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll(".filter").forEach(item => item.classList.remove("active"));
      btn.classList.add("active");
      state.filter = btn.dataset.filter;
      renderThreads();
    }));
    document.querySelectorAll(".status-btn").forEach(btn => btn.addEventListener("click", () => saveThread(btn.dataset.status).catch(err => alert(err.message))));
    $("search").addEventListener("input", renderThreads);
    $("refresh").addEventListener("click", () => loadAll(true).catch(err => alert(err.message)));
    $("analyze-top").addEventListener("click", () => backfillSignals().catch(err => alert(err.message)));
    $("import-members").addEventListener("click", () => alert("會員資料已由 Worker/D1 讀取；若要重新匯入 Excel，請回管理站執行匯入。"));
    $("show-risk").addEventListener("click", () => {
      state.riskExpanded = !state.riskExpanded;
      $("show-risk").textContent = state.riskExpanded ? "收合" : "看全部";
      renderAudience();
    });
    $("add-tag").addEventListener("click", () => {
      if (!state.active) return;
      const tag = $("new-tag").value.trim();
      if (tag && !state.active.tags.includes(tag)) state.active.tags.push(tag);
      $("new-tag").value = "";
      renderActive();
    });
    $("save-thread").addEventListener("click", () => saveThread().catch(err => alert(err.message)));
    $("preview-broadcast").addEventListener("click", () => previewBroadcast().catch(err => alert(err.message)));
    $("create-broadcast").addEventListener("click", () => createBroadcast().catch(err => alert(err.message)));

    const style = document.createElement("style");
    style.textContent = `
      .feature { min-height: 46px; border-radius: 14px; display: grid; place-items: center; font-size: 15px; font-weight: 900; }
      .filter { border-radius: 999px; padding: 8px 15px; font-size: 14px; font-weight: 900; color: #334155; background: #f1f5f9; }
      .filter.active { color: white; background: #020617; }
      .status-btn { border: 1px solid #cbd5e1; border-radius: 14px; padding: 10px 18px; font-size: 16px; font-weight: 900; background: white; color: #020617; }
      .metric { border-radius: 16px; padding: 13px; min-height: 74px; }
      .metric span { display: block; color: #64748b; font-size: 14px; font-weight: 800; }
      .metric strong { display: block; margin-top: 6px; font-size: 26px; line-height: 1; }
      @media (max-width: 1200px) {
        aside.w-\\[360px\\] { width: 340px; }
        section.grid-cols-\\[1fr_360px\\] { grid-template-columns: 1fr 320px; }
      }
    `;
    document.head.appendChild(style);

    loadAll(false).catch(err => alert(err.message));
  </script>
</body>
</html>
